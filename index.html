<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ООО "Быстрая Валюта"</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <h1>ООО «Быстрая Валюта»</h1>
          <p>Система обмена валют</p>
        <a class="admin-link" href="./admin.html">Админка</a>
      </div>

      <div class="toolbar">
        <button id="loadRatesBtn">Обновить курсы</button>
      </div>

      <div id="message" class="message"></div>

      <section class="card">
        <h2>Текущие внутренние курсы</h2>
        <div id="ratesCards" class="rates-grid"></div>
      </section>

      <section class="card">
        <h2>Динамика котировок</h2>
        <div class="charts-grid">
          <div class="chart-card">
            <h3>USD → RUB</h3>
            <canvas id="chartUsdRub"></canvas>
          </div>
          <div class="chart-card">
            <h3>USD → EUR</h3>
            <canvas id="chartUsdEur"></canvas>
          </div>
          <div class="chart-card">
            <h3>USD → CNY</h3>
            <canvas id="chartUsdCny"></canvas>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Создать заявку</h2>
        <form id="requestForm" class="form">
          <label>
            Email клиента
            <input id="userEmail" type="text" placeholder="Например: client@example.com" />
          </label>
          
          <label>
            ФИО клиента
            <input id="clientFullName" type="text" placeholder="Например: Иванов Иван Иванович" />
          </label>

          <label>
            Валютная пара
            <select id="pairSelect"></select>
          </label>

          <label>
            Сумма
            <input id="amountFrom" type="number" value="100" />
          </label>

          <button type="submit">Создать заявку</button>
        </form>
      </section>
    </div>
  </body>
</html>
